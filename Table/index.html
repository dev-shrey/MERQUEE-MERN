<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan</title>
</head>
<body>

    <table border="1">
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Performance</th>
        </tr>

        <tr>
            <th>Batch</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Rupesh</td>
            <td>7</td>
            <td>60</td>
        </tr>

        <tr>
            <td>Divya</td>
            <td>8</td>
            <td>80</td>
        </tr>

        <tr>
            <td>Krish</td>
            <td>6</td>
            <td>45</td>
        </tr>

    </table>

</body>
</html>
