<!DOCTYPE html>
<html>
<head>
    <title>Colspan Table</title>
</head>
<body>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Batch</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>Rupesh</td>
            <td>7</td>
            <td>60</td>
        </tr>

        <tr>
            <td>Divya</td>
            <td>8</td>
            <td>80</td>
        </tr>

        <tr>
            <td>Krish</td>
            <td>6</td>
            <td>45</td>
        </tr>

        <tr>
            <td colspan="2">Total Marks</td>
            <td>185</td>
        </tr>
    </table>

</body>
</html>
