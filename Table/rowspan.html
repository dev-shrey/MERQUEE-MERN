<!DOCTYPE html>
<html>
<head>
    <title>Rowspan Table</title>
</head>
<body>

    <table border="1">
        <tr>
            <th>Batch</th>
            <th>Name</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td rowspan="2">7</td>
            <td>Rupesh</td>
            <td>60</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>75</td>
        </tr>

        <tr>
            <td rowspan="2">8</td>
            <td>Divya</td>
            <td>80</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>90</td>
        </tr>
    </table>

</body>
</html>
