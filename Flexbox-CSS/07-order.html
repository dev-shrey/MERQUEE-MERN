<!DOCTYPE html>
<html>
<head>
<style>
.container{
    display:flex;
}

.box{
    width:100px;
    height:100px;
    border:2px solid green;
}

.one{order:3;}
.two{order:1;}
.three{order:2;}
</style>
</head>
<body>

<div class="container">
    <div class="box one">1</div>
    <div class="box two">2</div>
    <div class="box three">3</div>
</div>

</body>
</html>
