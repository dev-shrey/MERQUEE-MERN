<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart-Clone</title>
  <link rel="stylesheet" href="flipkart.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <!-- Header-->
  <header class="header">
    <div class="top">
      <div class="logo">Flipkart</div>
      <div class="travel">Travel</div>
      <div class="location">Vadodara, Gujarat</div>
    </div>
    <div class="middle">
      <input type="text" placeholder="Search for Products, Brand and More">
      <span>Login</span>
      <span>More</span>
      <span>Cart</span>
    </div>
    <div class="bottom">
      <div class="box">
        <!-- <i class="fa fa-shopping-cart" style="font-size:24px"></i>
        <p>Cart</p> -->
      </div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </header>

  <!-- HERO SECTION -->
  <section id="hero">
    <div class="image">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/d38023c109ca59af.png?q=60" alt="image1">
    </div>
    <div class="image">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/2b23873b05dd06ee.png?q=60" alt="image2">
    </div>
    <div class="image">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/a67f764e609062fd.png?q=60" alt="image3">
    </div>
  </section>

  <section id="recomendation">
    <div class="item">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/feae643bb211a73d.png?q=60" alt="" width="300px" height="300px">
      <p>$49</p>
    </div>

    <div class="item">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/feae643bb211a73d.png?q=60" alt="" width="300px" height="300px">
      <p>$49</p>

    </div>

    <div class="item">
      <img src="https://rukminim2.flixcart.com/fk-p-flap/760/1020/image/feae643bb211a73d.png?q=60" alt="" width="300px" height="300px">
      <p>$49</p>

    </div>
  </section>

  <!-- Footer Section -->
  <footer class="footer">
    <div class="description">
      <h2>Flipkart</h2>
      <p>Best to place to buy</p>
    </div>
    <div class="about">
      <h3>About</h3>
      <p>About us</p>
      <p>Contact us</p>
      <p>Career</p>
      <p>Information</p>
    </div>
    <div class="help">
      <h3>Help</h3>
      <p>Payment</p>
      <p>Orders</p>
      <p>Cancellation</p>
      <p>FAQ</p>
    </div>
    <p class="copy">@2026 | All rights are reserved</p>
  </footer>
</body>
</html>
