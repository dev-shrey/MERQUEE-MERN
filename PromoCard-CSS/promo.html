<!DOCTYPE html>
<html>
<head>
  <title>Promo Card</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f2f2f2;
      padding-top:100px;
    }

    .card{
      width:300px;
      background:white;
      border-radius:12px;
      overflow:hidden;
      position:relative;
      margin:0 auto;
    }

    .card img{
      width:100%;
      display:block;
    }

    .sale{
      position:absolute;
      top:10px;
      left:10px;

      background:red;
      color:white;
      padding:5px 10px;
      border-radius:5px;
      font-size:14px;
    }

    .heart{
      position:absolute;
      top:10px;
      right:10px;

      background:white;
      padding:8px;
      border-radius:50%;
      cursor:pointer;
    }

    .content{
      padding:15px;
    }

    .price{
      color:green;
      margin:10px 0;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      background:black;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#333;
    }
  </style>
</head>

<body>

  <div class="card">
    <span class="sale">SALE</span>
    <div class="heart">❤</div>
    <img src="https://imgs.search.brave.com/dxEYUdLnUKwBgz__7Oy1GBCcQjuhj4sYdigZXORgwYQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wNTkv/MTY1LzQxNy9zbWFs/bC9wYWlyLW9mLWdy/ZXkta25pdC1ydW5u/aW5nLXNob2VzLW9u/LWEtd2hpdGUtc3Vy/ZmFjZS1waG90by5q/cGVn" alt="Running Shoes">
    <div class="content">
      <h2>Running Shoes</h2>
      <p class="price">₹2999</p>
      <button>Add to Cart</button>
    </div>

  </div>

</body>
</html>
